# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - eTranlsations

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build ./ECA.Trams.FileTransferAPI/ECA.Trams.FileTransferAPI/ECA.Trams.FileTransferAPI.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish ./ECA.Trams.FileTransferAPI/ECA.Trams.FileTransferAPI/ECA.Trams.FileTransferAPI.csproj --configuration Release --output ./publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App (Kudu ZipDeploy)
        env:
          PUBLISH_PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          [xml]$profile = $env:PUBLISH_PROFILE
          $zipProfile = $profile.publishData.publishProfile |
            Where-Object { $_.publishMethod -eq 'ZipDeploy' } |
            Select-Object -First 1
          if (-not $zipProfile) { throw 'ZipDeploy profile not found in publish profile secret.' }

          $userName = $zipProfile.userName
          $password = $zipProfile.userPWD
          $publishUrl = $zipProfile.publishUrl
          $scmHost = ($publishUrl -split ':')[0]
          $pair = "{0}:{1}" -f $userName, $password
          $basic = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))

          $zipPath = Join-Path $env:RUNNER_TEMP 'site.zip'
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $PWD '*') -DestinationPath $zipPath -Force
          Write-Host "Created package $zipPath ($((Get-Item $zipPath).Length) bytes)"

          $uri = "https://$scmHost/api/zipdeploy?isAsync=true"
          Write-Host "Deploying to $uri"
          $response = Invoke-WebRequest -Uri $uri -Method POST -Headers @{ Authorization = "Basic $basic" } -InFile $zipPath -ContentType 'application/octet-stream' -UseBasicParsing
          Write-Host "ZipDeploy accepted: $($response.StatusCode)"

          # Poll deployment status (Kudu: 3=Failed, 4=Success)
          $statusUri = "https://$scmHost/api/deployments/latest"
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 5
            try {
              $status = Invoke-RestMethod -Uri $statusUri -Headers @{ Authorization = "Basic $basic" }
              Write-Host ("Status={0} complete={1} progress={2} text={3}" -f $status.status, $status.complete, $status.progress, $status.status_text)
              if ($status.complete -eq $true) {
                if ($status.status -eq 3) {
                  throw "Deployment failed: $($status.status_text)"
                }
                if ($status.status -eq 4) {
                  Write-Host 'Deployment completed successfully.'
                  break
                }
              }
            } catch {
              if ($_.Exception.Message -like 'Deployment failed:*') { throw }
              if ($i -eq 59) { throw }
              Write-Host "Waiting for deployment... $($_.Exception.Message)"
            }
          }
